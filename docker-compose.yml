services:

  # ── Application PostgreSQL (raw / features / serving / pipeline schemas) ──
  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${RECSYS_PG_USER:-postgres}
      POSTGRES_PASSWORD: ${RECSYS_PG_PASSWORD:-postgres}
      POSTGRES_DB: ${RECSYS_PG_DB:-movielens}
    volumes:
      - postgres_app_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RECSYS_PG_USER:-postgres} -d ${RECSYS_PG_DB:-movielens}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── MLflow tracking server ─────────────────────────────────────────────
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
    command: >
      mlflow server
      --backend-store-uri postgresql+psycopg2://${MLFLOW_PG_USER:-mlflow}:${MLFLOW_PG_PASSWORD:-mlflow}@postgres-mlflow:5432/${MLFLOW_PG_DB:-mlflow}
      --default-artifact-root s3://model-checkpoints
      --host 0.0.0.0
      --port 5000
      --workers 4
      --gunicorn-opts "--timeout 300 --worker-connections 200 --keep-alive 10"
    depends_on:
      postgres-mlflow:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
      
      
  # ── Dedicated PostgreSQL for MLflow + Optuna ───────────────────────────
  postgres-mlflow:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5433:5432"          # 5433 on host — avoids clash with your app's PG on 5432
    environment:
      POSTGRES_USER: ${MLFLOW_PG_USER}
      POSTGRES_PASSWORD: ${MLFLOW_PG_PASSWORD}
      POSTGRES_DB: ${MLFLOW_PG_DB}
    volumes:
      - postgres_mlflow_data:/var/lib/postgresql/data
      - ./docker/postgres-mlflow/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      postgres
      -c max_connections=300
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c work_mem=4MB
      -c checkpoint_completion_target=0.9
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MLFLOW_PG_USER} -d ${MLFLOW_PG_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      
# ── MinIO object store ─────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "9002:9000"          # Host 9002 -> Container 9000 (Avoids 9000 conflict!)
      - "9003:9001"          # Console UI
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO bucket initialisation (runs once then exits) ─────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    entrypoint: >
      /bin/sh -c "
        until mc alias set local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY; do
          echo 'Waiting for MinIO network/service...'
          sleep 2
        done &&
        mc mb --ignore-existing local/model-checkpoints &&
        mc mb --ignore-existing local/mlflow-artifacts &&
        echo 'Buckets ready.'
      "
      
  # ── Application (ingest/tune/train/serve — see entrypoint.sh) ──────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      RECSYS_DB_URL: postgresql+psycopg2://${RECSYS_PG_USER:-postgres}:${RECSYS_PG_PASSWORD:-postgres}@postgres:5432/${RECSYS_PG_DB:-movielens}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      MINIO_ENDPOINT: minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
      MOVIELENS_DATA_DIR: /data/movielens
      OPTUNA_STORAGE_URL: postgresql+psycopg2://${MLFLOW_PG_USER}:${MLFLOW_PG_PASSWORD}@postgres-mlflow:5432/optuna_studies
      INGEST_MODE: upsert
      PORT: 8000
    volumes:
      - recsys_state:/app/state              # persists the "already trained" marker
      - ./data:/data/movielens:ro             # put your ml-*.zip / extracted dir here
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

volumes:
  postgres_app_data:
  postgres_mlflow_data:
  minio_data:
  recsys_state:
