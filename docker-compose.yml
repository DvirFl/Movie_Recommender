services:

  # ── MLflow tracking server ─────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
    command: >
      mlflow server
      --backend-store-uri postgresql+psycopg2://${MLFLOW_PG_USER}:${MLFLOW_PG_PASSWORD}@postgres-mlflow:5432/${MLFLOW_PG_DB}
      --default-artifact-root s3://model-checkpoints
      --host 0.0.0.0
      --port 5000
      --workers 8
      --gunicorn-opts "--timeout 300 --worker-connections 200 --keep-alive 10"
    depends_on:
      postgres-mlflow:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Dedicated PostgreSQL for MLflow + Optuna ───────────────────────────
  postgres-mlflow:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5433:5432"          # 5433 on host — avoids clash with your app's PG on 5432
    environment:
      POSTGRES_USER: ${MLFLOW_PG_USER}
      POSTGRES_PASSWORD: ${MLFLOW_PG_PASSWORD}
      POSTGRES_DB: ${MLFLOW_PG_DB}
    volumes:
      - postgres_mlflow_data:/var/lib/postgresql/data
      - ./docker/postgres-mlflow/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      postgres
      -c max_connections=300
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c work_mem=4MB
      -c checkpoint_completion_target=0.9
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MLFLOW_PG_USER} -d ${MLFLOW_PG_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── MinIO object store ─────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "9000:9000"          # S3 API
      - "9001:9001"          # Console UI
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO bucket initialisation (runs once then exits) ─────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY &&
        mc mb --ignore-existing local/model-checkpoints &&
        mc mb --ignore-existing local/mlflow-artifacts &&
        echo 'Buckets ready.'
      "

volumes:
  postgres_mlflow_data:
  minio_data: